<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vitality | Calorie Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Plus+Jakarta+Sans:wght@300..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "surface-container-highest": "#dae2fd",
                    "secondary": "#b71b40",
                    "secondary-container": "#fd526f",
                    "on-secondary-container": "#5b0018",
                    "on-background": "#131b2e",
                    "on-surface-variant": "#3c4a46",
                    "on-primary-container": "#00493e",
                    "error": "#ba1a1a",
                    "tertiary-container": "#b49eff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#4800bf",
                    "tertiary": "#6833ea",
                    "background": "#faf8ff",
                    "on-primary": "#ffffff",
                    "primary": "#006b5c",
                    "on-surface": "#131b2e",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f2f3ff",
                    "surface-container": "#eaedff",
                    "surface-container-high": "#e2e7ff",
                    "outline-variant": "#bbcac4",
                    "surface": "#faf8ff",
                    "outline": "#6c7a76",
                    "primary-container": "#00c2a8"
                },
                borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                spacing: { lg: "40px", sm: "16px", gutter: "20px", "container-max": "1200px", base: "4px", md: "24px", xs: "8px", xl: "64px" },
                fontFamily: {
                    "body-lg": ["Plus Jakarta Sans"], "body-md": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Space Grotesk"], "headline-md": ["Space Grotesk"],
                    "display-lg": ["Space Grotesk"], "stat-value": ["Space Grotesk"],
                    "label-md": ["Plus Jakarta Sans"], "headline-lg": ["Space Grotesk"]
                },
                fontSize: {
                    "body-lg": ["18px", {"lineHeight":"28px","fontWeight":"400"}],
                    "body-md": ["16px", {"lineHeight":"24px","fontWeight":"400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight":"32px","fontWeight":"600"}],
                    "headline-md": ["20px", {"lineHeight":"28px","fontWeight":"500"}],
                    "display-lg": ["48px", {"lineHeight":"56px","letterSpacing":"-0.02em","fontWeight":"700"}],
                    "stat-value": ["14px", {"lineHeight":"16px","fontWeight":"700"}],
                    "label-md": ["14px", {"lineHeight":"20px","letterSpacing":"0.05em","fontWeight":"600"}],
                    "headline-lg": ["32px", {"lineHeight":"40px","letterSpacing":"-0.01em","fontWeight":"600"}]
                }
            }
        }
    }
</script>
<style>
    body { background-color: #faf8ff; -webkit-font-smoothing: antialiased; }
    .glass-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 4px 24px rgba(0,107,92,0.05); }
    .progress-ring-circle { transition: stroke-dashoffset 0.8s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .nav-link.active-nav { background: #00c2a8; color: #00493e; }
</style>
</head>
<body class="font-body-md text-on-background min-h-screen pb-32">

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center px-gutter">
  <div class="glass-card rounded-[32px] p-8 w-full max-w-sm">
    <h1 class="font-display-lg text-headline-lg text-primary text-center mb-1">Vitality</h1>
    <p class="text-center text-on-surface-variant text-sm mb-6" id="auth-subtitle">Log in to track your day</p>

    <div id="auth-error" class="hidden bg-error-container text-error text-sm rounded-xl px-4 py-3 mb-4"></div>

    <form id="auth-form" class="space-y-3">
      <input id="auth-email" type="email" required placeholder="Email" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-on-surface focus:ring-2 focus:ring-primary/20 font-body-md placeholder:text-outline/60"/>
      <div class="relative">
        <input id="auth-password" type="password" required placeholder="Password" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 pr-12 text-on-surface focus:ring-2 focus:ring-primary/20 font-body-md placeholder:text-outline/60"/>
        <button type="button" id="toggle-password-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary">
          <span class="material-symbols-outlined text-[20px]" id="toggle-password-icon">visibility</span>
        </button>
      </div>
      <button type="submit" id="auth-submit-btn" class="w-full bg-primary text-on-primary rounded-2xl py-4 font-label-md hover:opacity-90 active:scale-95 transition-all">Log In</button>
    </form>

    <p class="text-center text-sm text-on-surface-variant mt-5">
      <span id="auth-toggle-text">Don't have an account?</span>
      <button id="auth-toggle-btn" class="text-primary font-bold ml-1">Sign up</button>
    </p>
  </div>
</div>

<!-- ============ APP SHELL (hidden until logged in) ============ -->
<div id="app-shell" class="hidden">

  <header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-white/30 shadow-sm shadow-primary/5">
    <div class="flex items-center justify-between px-sm h-16 w-full max-w-container-max mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold" id="user-avatar">U</div>
        <div>
          <h1 class="font-display-lg text-headline-lg-mobile tracking-tighter text-primary leading-none">Vitality</h1>
          <p class="text-[11px] text-outline" id="user-email-label"></p>
        </div>
      </div>
      <button id="logout-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:opacity-80 transition-opacity active:scale-95 text-secondary">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
  </header>

  <main class="pt-24 px-gutter max-w-md mx-auto space-y-gutter">

    <!-- ===== TODAY TAB ===== -->
    <div id="tab-today" class="tab-panel active space-y-gutter">

      <section class="glass-card rounded-[32px] p-8 text-center">
        <h2 class="font-headline-md text-headline-md text-on-surface-variant mb-6">Today's Balance</h2>
        <div class="relative inline-flex items-center justify-center">
          <svg class="w-64 h-64">
            <circle class="text-surface-container-high" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-width="12"></circle>
            <circle id="ring-fill" class="text-primary progress-ring-circle" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-dasharray="691.15" stroke-dashoffset="691.15" stroke-linecap="round" stroke-width="12"></circle>
          </svg>
          <div class="absolute flex flex-col items-center">
            <span class="font-display-lg text-display-lg text-on-surface" id="ring-number">2,000</span>
            <span class="font-label-md text-label-md text-outline tracking-widest uppercase">kcal left</span>
          </div>
        </div>
        <div class="mt-6 flex justify-center gap-8 text-sm">
          <div><span class="font-stat-value block text-on-surface" id="stat-consumed">0</span><span class="text-outline text-[11px] uppercase tracking-wide">Consumed</span></div>
          <div><span class="font-stat-value block text-on-surface" id="stat-meals">0</span><span class="text-outline text-[11px] uppercase tracking-wide">Meals</span></div>
          <div><span class="font-stat-value block text-on-surface">2,000</span><span class="text-outline text-[11px] uppercase tracking-wide">Goal</span></div>
        </div>
      </section>

      <section class="glass-card rounded-3xl p-6 space-y-3">
        <div class="flex items-center justify-between mb-1">
          <h3 class="font-headline-md text-headline-md text-on-surface">Quick Log</h3>
          <span class="material-symbols-outlined text-primary">auto_awesome</span>
        </div>
        <div class="relative">
          <input id="meal-input" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-on-surface focus:ring-2 focus:ring-primary/20 font-body-md placeholder:text-outline/60" placeholder="I had a chicken avocado salad..." type="text"/>
          <button id="analyze-btn" class="absolute right-2 top-2 bottom-2 bg-primary-container text-on-primary-container px-4 rounded-xl flex items-center gap-2 font-label-md hover:opacity-90 active:scale-95 transition-all">
            <span>Analyze</span>
          </button>
        </div>

        <div id="estimate-row" class="hidden items-center gap-2 bg-tertiary-container/30 rounded-2xl p-3">
          <input id="estimate-kcal" type="number" class="w-24 bg-white rounded-xl py-2 px-3 text-on-surface text-center font-stat-value"/>
          <span class="text-sm text-on-surface-variant flex-1">kcal — estimated. Adjust if needed.</span>
          <button id="confirm-log-btn" class="bg-primary text-on-primary rounded-xl px-4 py-2 font-label-md">Log</button>
        </div>

        <p class="text-[12px] text-outline-variant px-1 italic">Try: "Two eggs and a slice of whole grain toast"</p>
      </section>

      <section class="space-y-3">
        <h3 class="font-headline-md text-headline-md text-on-surface px-1">Recent Meals</h3>
        <div id="meal-list" class="space-y-3"></div>
      </section>
    </div>

    <!-- ===== COACH TAB ===== -->
    <div id="tab-coach" class="tab-panel space-y-gutter">
      <section class="glass-card rounded-3xl p-5 flex flex-col h-[60vh]">
        <h3 class="font-headline-md text-headline-md text-on-surface mb-3">Ask the Coach</h3>
        <div id="chat-log" class="flex-1 overflow-y-auto space-y-3 pr-1"></div>
        <div class="relative mt-3">
          <input id="chat-input" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 pr-24 text-on-surface focus:ring-2 focus:ring-primary/20 font-body-md placeholder:text-outline/60" placeholder="Ask about nutrition, swaps..." type="text"/>
          <button id="chat-send-btn" class="absolute right-2 top-2 bottom-2 bg-primary text-on-primary px-4 rounded-xl font-label-md">Ask</button>
        </div>
      </section>
    </div>

  </main>

  <nav class="fixed bottom-0 w-full z-50 bg-surface/80 backdrop-blur-2xl border-t border-white/20 shadow-xl shadow-on-surface/5 rounded-t-xl">
    <div class="flex justify-around items-center h-20 px-gutter w-full max-w-container-max mx-auto">
      <button data-tab="tab-today" class="nav-link active-nav flex flex-col items-center justify-center rounded-full px-5 py-1 active:scale-90 duration-200 ease-out">
        <span class="material-symbols-outlined">donut_large</span>
        <span class="font-label-md text-label-md">Today</span>
      </button>
      <button data-tab="tab-coach" class="nav-link flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-200 px-5 py-1 rounded-full">
        <span class="material-symbols-outlined">chat_bubble</span>
        <span class="font-label-md text-label-md">Coach</span>
      </button>
    </div>
  </nav>

</div>

<script>
  const API = "http://localhost:3000";
  const GOAL = 2000;
  const RING_CIRCUMFERENCE = 691.15;

  let authToken = null;
  let currentUser = null;

  // ---------- Auth screen wiring ----------
  const authScreen = document.getElementById("auth-screen");
  const appShell = document.getElementById("app-shell");
  const authForm = document.getElementById("auth-form");
  const authError = document.getElementById("auth-error");
  const authSubtitle = document.getElementById("auth-subtitle");
  const authToggleText = document.getElementById("auth-toggle-text");
  const authToggleBtn = document.getElementById("auth-toggle-btn");
  const authSubmitBtn = document.getElementById("auth-submit-btn");

  const togglePasswordBtn = document.getElementById("toggle-password-btn");
  const togglePasswordIcon = document.getElementById("toggle-password-icon");
  const authPasswordInput = document.getElementById("auth-password");

  togglePasswordBtn.addEventListener("click", () => {
    const isHidden = authPasswordInput.type === "password";
    authPasswordInput.type = isHidden ? "text" : "password";
    togglePasswordIcon.textContent = isHidden ? "visibility_off" : "visibility";
  });

  let mode = "login"; // or "signup"

  authToggleBtn.addEventListener("click", () => {
    mode = mode === "login" ? "signup" : "login";
    if (mode === "signup") {
      authSubtitle.textContent = "Create an account to get started";
      authSubmitBtn.textContent = "Sign Up";
      authToggleText.textContent = "Already have an account?";
      authToggleBtn.textContent = "Log in";
    } else {
      authSubtitle.textContent = "Log in to track your day";
      authSubmitBtn.textContent = "Log In";
      authToggleText.textContent = "Don't have an account?";
      authToggleBtn.textContent = "Sign up";
    }
    authError.classList.add("hidden");
  });

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    authError.classList.add("hidden");

    const endpoint = mode === "login" ? "/api/auth/login" : "/api/auth/signup";

    try {
      const res = await fetch(`${API}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        authError.textContent = data.error || "Something went wrong.";
        authError.classList.remove("hidden");
        return;
      }

      authToken = data.token;
      currentUser = data.user;
      enterApp();
    } catch (err) {
      authError.textContent = "Could not reach the server. Is it running?";
      authError.classList.remove("hidden");
    }
  });

  function enterApp() {
    authScreen.classList.add("hidden");
    appShell.classList.remove("hidden");
    document.getElementById("user-email-label").textContent = currentUser.email;
    document.getElementById("user-avatar").textContent = currentUser.email.charAt(0).toUpperCase();
    loadMeals();
  }

  document.getElementById("logout-btn").addEventListener("click", () => {
    authToken = null;
    currentUser = null;
    appShell.classList.add("hidden");
    authScreen.classList.remove("hidden");
    authForm.reset();
  });

  // ---------- Tab switching ----------
  document.querySelectorAll(".nav-link").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-link").forEach(b => b.classList.remove("active-nav"));
      btn.classList.add("active-nav");
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      document.getElementById(btn.dataset.tab).classList.add("active");
    });
  });

  // ---------- Meals ----------
  async function loadMeals() {
    try {
      const res = await fetch(`${API}/api/meals`, {
        headers: { Authorization: `Bearer ${authToken}` },
      });
      const meals = await res.json();
      renderMeals(meals);
    } catch (err) {
      document.getElementById("meal-list").innerHTML = `<p class="text-sm text-outline text-center py-4">Could not reach the server.</p>`;
    }
  }

  function renderMeals(meals) {
    const total = meals.reduce((sum, m) => sum + m.calories, 0);
    const pct = Math.min(total / GOAL, 1);

    document.getElementById("ring-number").textContent = Math.max(GOAL - total, 0).toLocaleString();
    document.getElementById("ring-fill").style.strokeDashoffset = RING_CIRCUMFERENCE - pct * RING_CIRCUMFERENCE;
    document.getElementById("stat-consumed").textContent = total.toLocaleString();
    document.getElementById("stat-meals").textContent = meals.length;

    const listEl = document.getElementById("meal-list");
    if (meals.length === 0) {
      listEl.innerHTML = `<p class="text-sm text-outline text-center py-4">No meals logged yet.</p>`;
      return;
    }

    listEl.innerHTML = meals.map(m => `
      <div class="glass-card rounded-2xl p-4 flex items-center justify-between">
        <div class="flex items-center gap-4 min-w-0">
          <div class="w-12 h-12 rounded-xl bg-primary-container flex items-center justify-center text-on-primary-container font-bold flex-shrink-0">
            ${escapeHtml(m.name).charAt(0).toUpperCase()}
          </div>
          <div class="min-w-0">
            <p class="font-body-md font-bold text-on-surface truncate">${escapeHtml(m.name)}</p>
            <p class="font-label-md text-[12px] text-outline">${new Date(m.createdAt).toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" })}</p>
          </div>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <p class="font-stat-value text-primary">${m.calories} kcal</p>
          <button onclick="deleteMeal('${m._id}')" class="w-7 h-7 rounded-full bg-surface-container-low text-outline hover:bg-error hover:text-white flex items-center justify-center text-xs">✕</button>
        </div>
      </div>
    `).join("");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  async function deleteMeal(id) {
    try {
      await fetch(`${API}/api/meals/${id}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${authToken}` },
      });
      loadMeals();
    } catch (err) {
      alert("Could not delete meal.");
    }
  }

  // ---------- Analyze + Log ----------
  const estimateRow = document.getElementById("estimate-row");
  const estimateKcalInput = document.getElementById("estimate-kcal");

  document.getElementById("analyze-btn").addEventListener("click", async () => {
    const desc = document.getElementById("meal-input").value.trim();
    if (!desc) return;

    const btn = document.getElementById("analyze-btn");
    btn.textContent = "…";
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/api/estimate-calories`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ foodDescription: desc }),
      });
      const data = await res.json();

      if (data.estimatedCalories) {
        estimateKcalInput.value = data.estimatedCalories;
        estimateRow.classList.remove("hidden");
        estimateRow.classList.add("flex");
      } else {
        alert("Could not estimate calories — enter manually below.");
        estimateKcalInput.value = "";
        estimateRow.classList.remove("hidden");
        estimateRow.classList.add("flex");
      }
    } catch (err) {
      alert("Could not reach the AI estimator.");
    } finally {
      btn.textContent = "Analyze";
      btn.disabled = false;
    }
  });

  document.getElementById("confirm-log-btn").addEventListener("click", async () => {
    const name = document.getElementById("meal-input").value.trim();
    const calories = parseInt(estimateKcalInput.value, 10);

    if (!name || isNaN(calories)) {
      alert("Enter a meal description and calorie amount.");
      return;
    }

    try {
      await fetch(`${API}/api/meals`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` },
        body: JSON.stringify({ name, calories }),
      });
      document.getElementById("meal-input").value = "";
      estimateRow.classList.add("hidden");
      estimateRow.classList.remove("flex");
      loadMeals();
    } catch (err) {
      alert("Could not save meal.");
    }
  });

  // ---------- Chat ----------
  const chatLog = document.getElementById("chat-log");

  function addChatMsg(role, text) {
    const div = document.createElement("div");
    div.className = role === "user"
      ? "bg-on-background text-white rounded-2xl rounded-br-md px-4 py-2 text-sm ml-auto max-w-[85%]"
      : "bg-surface-container-lowest border border-outline-variant rounded-2xl rounded-bl-md px-4 py-2 text-sm max-w-[85%]";
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  document.getElementById("chat-send-btn").addEventListener("click", sendChat);
  document.getElementById("chat-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendChat();
  });

  async function sendChat() {
    const input = document.getElementById("chat-input");
    const message = input.value.trim();
    if (!message) return;

    addChatMsg("user", message);
    input.value = "";

    const loadingDiv = document.createElement("div");
    loadingDiv.className = "text-xs text-outline italic";
    loadingDiv.id = "chat-loading";
    loadingDiv.textContent = "Thinking…";
    chatLog.appendChild(loadingDiv);

    try {
      const res = await fetch(`${API}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      document.getElementById("chat-loading")?.remove();
      addChatMsg("assistant", data.reply || "No response.");
    } catch (err) {
      document.getElementById("chat-loading")?.remove();
      addChatMsg("assistant", "Could not reach the assistant.");
    }
  }
</script>
</body>
</html>
